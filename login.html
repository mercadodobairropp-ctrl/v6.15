<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login - Painel Operacional</title><link rel="manifest" href="manifest.json"><link rel="icon" href="icon-192.png"><link rel="stylesheet" href="styles.css?v=v615-limpo-login-enter-20260626"></head><body>
<div class="loginBox"><div class="center"><img src="icon-512.png" class="logo" style="width:96px;height:96px;border-radius:22px"><h1>Painel Operacional</h1><div class="sub">Confiança Supermercados • v6.15</div></div><input id="login" placeholder="Login" inputmode="numeric"><input id="senha" placeholder="Senha" type="password" inputmode="numeric"><button onclick="entrar()">Entrar</button><a class="btn secondary" href="monitor.html">Abrir monitor de alertas</a><p id="status" class="small">Usuários sincronizados com Google Sheets.<br>Desenvolvido por Andre Vailatti.</p><p id="erro" style="color:#ef4444;font-weight:bold"></p></div>
<script src="config.js?v=v615-limpo-login-enter-20260626"></script><script src="app.js?v=v615-limpo-login-enter-20260626"></script><script>
async function gravarLogLogin(tipo,u,detalhe){try{await jsonpRetry("log",{tipo,login:u.login,nomeUsuario:u.nome,detalhe},1,7000)}catch(e){}}
async function entrar(){const l=login.value.trim(),s=normalizarSenha(senha.value);erro.innerText="";status.innerText="Conferindo login na nuvem...";try{const us=await buscarUsuariosLogin();const loginNormalizado=normalizarLogin(l);const u=normalizarUsuario(us.find(x=>normalizarLogin(x.login)===loginNormalizado&&normalizarSenha(x.senha)===s)||{});if(!u.login){erro.innerText="Login ou senha inválidos.";status.innerText="Tente novamente.";return}const empresa=await garantirEmpresaDispositivo();if(u.tipo!=="admin"&&!empresa){await gravarLogLogin("login_bloqueado",u,"motivo=empresa_dispositivo_nao_definida");erro.innerText="Empresa deste dispositivo não definida.";status.innerText="Entre com um administrador para configurar a empresa deste aparelho.";return}if(u.tipo!=="admin"&&!usuarioPodeVerEmpresa(u,empresa)){await gravarLogLogin("login_bloqueado",u,`empresa=${empresa};motivo=empresa_nao_liberada;empresasUsuario=${u.empresasPermitidas};turnosUsuario=${u.turnosPermitidos}`);erro.innerText="Empresa não liberada para usuário.";status.innerText="Este usuário não tem acesso à empresa definida neste dispositivo.";return}status.innerText="Login liberado. Registrando acesso...";await gravarLogLogin("login_ok",u,`empresa=${empresa};empresasUsuario=${u.empresasPermitidas};turnosUsuario=${u.turnosPermitidos}`);if(!salvarSessaoLocal("usuarioLogado",u))throw new Error("O navegador não conseguiu guardar a sessão. Libere espaço de armazenamento do site.");lsRemove("turnoSelecionado");lsRemove(`turnoSelecionado_${u.login}`);marcarSync();location.href="painel.html"}catch(e){erro.innerText="Não foi possível concluir o login.";status.innerHTML=`${e.name?e.name+": ":""}${e.message||"Falha ao conectar ao Google Script."}<br><a target="_blank" href="${APP.API_URL}?acao=getUsers&callback=teste">Testar conexão com a base</a>`}}
function buscarUsuariosLogin(){return Promise.race([carregarUsuariosOnline(true),new Promise((_,reject)=>setTimeout(()=>reject(new Error("Tempo esgotado ao buscar usuários online.")),NET.jsonpTimeout+3000))])}
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script></body></html>
