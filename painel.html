const usuario=exigirLogin();let adminConteudo=null,checklistsCarregados=[],checklistsTodos=[],turnosCarregados=[],empresasCarregadas=[],execucoes=[],secaoAberta=null,recargaVaziaEmAndamento=false,recargaVaziaTentativas=0,baseOnlineOk=false,erroBaseOnline="";titulo.innerText=`Olá ${usuario.nome || "usuário"},`;

async function carregarBase(force=false,forte=false){await garantirEmpresaDispositivo();let pacote;try{const emp=empresaDispositivo();if(usuario.tipo!=="admin"&&emp){pacote=await carregarOperacionalOnline(usuario.login,emp,hojeISO(),force||forte)}else{pacote=forte?await sincronizarBaseCompleta(hojeISO(),hojeISO()):await carregarPacoteOnline(hojeISO(),hojeISO(),force);if(!Mem.usuarios&&navigator.onLine){try{await carregarUsuariosOnline(true)}catch(e){}}}baseOnlineOk=true;erroBaseOnline=""}catch(e){baseOnlineOk=false;erroBaseOnline=e.message||"Não foi possível carregar a base online.";throw e}const turnos=pacote.turnos||[],empresas=pacote.empresas||[],todos=pacote.checklists||[],execs=pacote.execucoes||[];turnosCarregados=turnos.sort((a,b)=>ordenarTexto(a.empresaId,b.empresaId)||ordenarTexto(a.nome,b.nome));empresasCarregadas=empresas.sort((a,b)=>ordenarTexto(a.nome,b.nome));checklistsTodos=todos.map(normalizarChecklist).sort(ordenarChecklistsBase);checklistsCarregados=checklistsTodos.filter(c=>c.ativo!=="nao");execucoes=execs;sincronizarUsuarioLogado();marcarSync(pacote.sync?.servidorEm)}
function sincronizarUsuarioLogado(){const lista=Mem.usuarios||listaLocal("usuariosSistema",[]),atual=lista.find(u=>normalizarLogin(u.login)===usuario.login);if(!atual)return;const novo=normalizarUsuario(atual);["nome","tipo","turnosPermitidos","empresasPermitidas"].forEach(k=>usuario[k]=novo[k]);lsSet("usuarioLogado",JSON.stringify(usuario));titulo.innerText=`Olá ${usuario.nome || "usuário"},`}

function upsertItem(lista,key,obj){const i=lista.findIndex(x=>String(x[key])===String(obj[key]));if(i>=0)lista[i]={...lista[i],...obj};else lista.push(obj)}

function nomeTurno(id){return turnosCarregados.find(t=>t.id===id)?.nome||id}

function empresasPermitidasUsuario(){return usuario.tipo==="admin"?empresasCarregadas.map(e=>e.id):parseLista(usuario.empresasPermitidas||"").filter(id=>empresasCarregadas.some(e=>e.id===id))}
function limparEmpresaDispositivoInvalida(){}

function slugId(v){return String(v||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g,"").trim()}

function execOnline(id){return execucoes.find(e=>e.idExecucao===id)}
function execCombinada(c){const id=execId(c),online=execOnline(id),local=getExecLocal(id);if(local?.data&&local.data!==hojeISO()){removeExecLocal(id);return online||null}if(online)return online;if(local?.status==="executando"&&local.inicioISO&&Date.now()-new Date(local.inicioISO).getTime()>8*60*60*1000){removeExecLocal(id);return null}return local}

function renderAdmin(){if(usuario.tipo!=="admin"){renderOperador();return}adminArea.innerHTML=`<div class="card"><h2>Painel Gerencial</h2><div class="grid two"><button onclick="toggleSecao('dispositivo',mostrarDispositivo)">Empresa do dispositivo</button><button onclick="toggleSecao('diagnostico',mostrarDiagnostico)">Diagnóstico do dispositivo</button><button onclick="toggleSecao('usuarios',mostrarUsuarios)">Usuários</button><button onclick="toggleSecao('empresas',mostrarEmpresas)">Empresas e turnos</button><button onclick="toggleSecao('novo',()=>mostrarNovoChecklist())">+ Novo checklist</button><button onclick="toggleSecao('existentes',mostrarExistentes)">Checklists existentes</button><button onclick="toggleSecao('relatorio',mostrarRelatorio)">Relatórios</button><button onclick="toggleSecao('todos',mostrarTodos)">Visualizar todos hoje</button></div><div id="adminConteudo"></div></div>`;adminConteudo=document.getElementById("adminConteudo");operadorArea.innerHTML=""}
async function mostrarDispositivo(){const atual=await garantirEmpresaDispositivo(),deviceId=await garantirDeviceId();adminConteudo.innerHTML=`<h3>Empresa deste dispositivo</h3><div class="card"><div class="small">ID do dispositivo: <b>${deviceId}</b></div><select id="empresaDispositivoAdmin"><option value="">Sem empresa definida</option>${empresasCarregadas.map(e=>`<option value="${e.id}" ${atual===e.id?"selected":""}>${e.nome}</option>`).join("")}</select><p class="small">Após salvar, este aparelho mostrará automaticamente apenas atividades da empresa selecionada no painel operacional e no monitor de alertas. Se a empresa local sumir, o app tenta restaurar pela nuvem usando o ID deste dispositivo.</p><button onclick="salvarEmpresaDispositivoAdmin()">Salvar</button><div id="empresaDispositivoStatus" class="small"></div></div>`}
async function salvarEmpresaDispositivoAdmin(){const deviceId=await salvarEmpresaDispositivoPersistente(empresaDispositivoAdmin.value).then(()=>garantirDeviceId());if(window.empresaDispositivoStatus)empresaDispositivoStatus.innerText=`Empresa salva no aparelho e na nuvem para o dispositivo ${deviceId}.`}
function linhaDiag(nome,status,detalhe=""){const cls=status==="ok"?"green":status==="alerta"?"yellow":"red";const txt=status==="ok"?"OK":status==="alerta"?"Atenção":"Erro";return `<div class="tableItem"><b>${nome}</b> <span class="badge ${cls}">${txt}</span>${detalhe?`<br><span class="small">${detalhe}</span>`:""}</div>`}
function parseDetalheLog(s=""){const o={};String(s||"").split(";").forEach(p=>{const i=p.indexOf("=");if(i>0)o[p.slice(0,i).trim()]=p.slice(i+1).trim()});return o}
function motivoChecklistsUsuario(u,empresaId){const dia=diaSemanaAtual();if(!empresaId)return"Empresa do dispositivo não definida.";if(!u)return"Usuário não encontrado na base atual.";if(!usuarioPodeVerEmpresa(u,empresaId))return"Usuário não tem acesso à empresa deste dispositivo.";const turnosUser=parseLista(u.turnosPermitidos||"");if(!turnosUser.length)return"Usuário não tem turnos liberados.";const checksDia=checklistsCarregados.filter(c=>c.ativo!=="nao"&&(!c.dias.length||c.dias.includes(dia)));const checksEmpresa=checksDia.filter(c=>c.empresaId===empresaId);if(!checksEmpresa.length)return"Não há checklists ativos hoje para esta empresa.";const checksTurnos=checksEmpresa.filter(c=>c.turnos.some(t=>turnosUser.includes(t)||turnosUser.includes("todos")));if(!checksTurnos.length)return"Há checklists na empresa, mas nenhum nos turnos liberados para o usuário.";return`OK: ${checksTurnos.length} checklist(s) deveriam aparecer nos turnos liberados.`}
function htmlLoginsDia(logs=[]){if(!logs.length)return linhaDiag("Logins de hoje","alerta","Nenhum login registrado hoje ainda.");const usuarios=Mem.usuarios||listaLocal("usuariosSistema",[]);return `<h3>Logins de hoje</h3>${logs.slice(-25).reverse().map(l=>{const d=new Date(l.dataHora),hora=isNaN(d.getTime())?String(l.dataHora||"").slice(11,16):horaBR(d),det=parseDetalheLog(l.detalhe),u=usuarios.find(x=>normalizarLogin(x.login)===normalizarLogin(l.login)),emp=det.empresa||empresaDispositivo(),motivo=l.tipo==="login_ok"?motivoChecklistsUsuario(u,emp):(det.motivo||"login bloqueado");return `<div class="tableItem"><b>${hora} - ${l.nomeUsuario||nomePorLogin(l.login)}</b> <span class="badge ${l.tipo==="login_ok"?"green":"red"}">${l.tipo}</span><br><span class="small">Login: ${l.login||"-"}<br>Empresa: ${emp?nomeEmpresa(emp)+" ("+emp+")":"não definida"}<br>Empresas do usuário: ${u?parseLista(u.empresasPermitidas).map(nomeEmpresa).join(", ")||"nenhuma":det.empresasUsuario||"-"}<br>Turnos do usuário: ${u?parseLista(u.turnosPermitidos).map(nomeTurno).join(", ")||"nenhum":det.turnosUsuario||"-"}<br>Diagnóstico: ${motivo}</span></div>`}).join("")}`}
async function testarCameraDiag(){if(!navigator.mediaDevices?.getUserMedia)return {status:"erro",detalhe:"Navegador não oferece acesso à câmera."};let s=null;try{s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});return {status:"ok",detalhe:"Permissão de câmera disponível."}}catch(e){return {status:"alerta",detalhe:"Câmera bloqueada ou indisponível neste momento."}}finally{try{s?.getTracks().forEach(t=>t.stop())}catch(e){}}}
async function diagnosticoArmazenamento(){try{const est=await navigator.storage?.estimate?.();if(!est)return {status:"alerta",detalhe:"Navegador não informou a cota de armazenamento."};const usado=Math.round((est.usage||0)/1024/1024),total=Math.round((est.quota||0)/1024/1024),pct=est.quota?Math.round((est.usage/est.quota)*100):0,persistente=await navigator.storage?.persisted?.(),backup=await lerConfigDispositivo("empresaDispositivo"),deviceId=await garantirDeviceId(),nuvem=await buscarEmpresaDispositivoNuvem(deviceId);return {status:pct>85?"alerta":"ok",detalhe:`Uso aproximado: ${usado} MB de ${total} MB (${pct}%). Persistente: ${persistente?"sim":"não"}. ID dispositivo: ${deviceId}. Backup local: ${backup||"não gravado"}. Backup nuvem: ${nuvem||"não gravado"}.`}}catch(e){return {status:"alerta",detalhe:"Não foi possível ler o armazenamento."}}}
async function diagnosticoCacheApp(){try{const regs="serviceWorker"in navigator?await navigator.serviceWorker.getRegistrations():[],keys="caches"in window?await caches.keys():[],ctrl=!!navigator.serviceWorker?.controller,local=lsGet("appVersaoDados")||"não gravada";return {status:(ctrl||regs.length)?"ok":"alerta",detalhe:`Service Worker: ${ctrl?"ativo":"registrado sem controle imediato"} (${regs.length}). Caches: ${keys.length?keys.join(", "):"nenhum"}. Versão local: ${local}.`}}catch(e){return {status:"alerta",detalhe:"Não foi possível ler Service Worker/cache."}}}
async function forcarReloadControlado(novaVersao){try{if("caches"in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)))}}catch(e){}try{if("serviceWorker"in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}}catch(e){}lsSet("appVersaoDados",novaVersao||APP.versao);location.reload()}
function verificarVersaoServidor(info){const v=info?.versao||"";if(!v||v===APP.versao)return linhaDiag("Versão servidor/app","ok",`Servidor ${v||"sem versão"} e app ${APP.versao}.`);const chave=`reloadVersao_${v}_${APP.versao}`;if(!lsGet(chave)){lsSet(chave,"1");setTimeout(()=>forcarReloadControlado(v),1200);return linhaDiag("Versão servidor/app","alerta",`Servidor ${v}, app ${APP.versao}. Limpando cache e recarregando uma vez.`)}return linhaDiag("Versão servidor/app","alerta",`Servidor ${v}, app ${APP.versao}. O cache já foi limpo uma vez neste aparelho.`)}
async function mostrarDiagnostico(){adminConteudo.innerHTML='<h3>Diagnóstico do dispositivo</h3><div class="card">Executando testes...</div>';const linhas=[];const emp=empresaDispositivo();linhas.push(linhaDiag("Versão do app","ok","Painel Operacional v6.15"));linhas.push(linhaDiag("Internet",navigator.onLine?"ok":"erro",navigator.onLine?"O navegador informa conexão ativa.":"O navegador informa offline."));linhas.push(linhaDiag("Empresa deste dispositivo",emp?"ok":"alerta",emp?`${nomeEmpresa(emp)} (${emp})`:"Nenhuma empresa definida neste aparelho."));linhas.push(linhaDiag("Usuário logado",usuario?.login?"ok":"erro",`${usuario.nome||""} (${usuario.login||"sem login"}) - ${usuario.tipo||""}`));linhas.push(linhaDiag("Acesso do usuário à empresa",!emp?"alerta":usuarioPodeVerEmpresa(usuario,emp)?"ok":"erro",!emp?"Defina a empresa do dispositivo.":usuarioPodeVerEmpresa(usuario,emp)?"Usuário possui acesso à empresa deste aparelho.":"Usuário não possui acesso à empresa deste aparelho."));try{const info=await jsonpRetry("getSyncInfo",{},1,12000);linhas.push(linhaDiag("Apps Script",info?.status==="ok"?"ok":"alerta",info?.versao?`Servidor ${info.versao}`:(info?.mensagem||"Servidor respondeu.")));linhas.push(verificarVersaoServidor(info))}catch(e){linhas.push(linhaDiag("Apps Script","erro",e.message||"Sem resposta do servidor."))}try{await carregarBase(true,true);linhas.push(linhaDiag("Base online","ok",`Empresas: ${empresasCarregadas.length}. Turnos: ${turnosCarregados.length}. Checklists ativos: ${checklistsCarregados.length}. Execuções hoje: ${execucoes.length}.`))}catch(e){linhas.push(linhaDiag("Base online","erro",e.message||"Não foi possível carregar a base online."))}const turnosDisp=usuario.tipo==="admin"?turnosCarregados:turnosComChecklistHoje();linhas.push(linhaDiag("Turnos disponíveis neste aparelho",turnosDisp.length?"ok":"alerta",turnosDisp.length?turnosDisp.map(t=>t.nome).join(", "):"Nenhum turno disponível para usuário/empresa/checklists de hoje."));const arm=await diagnosticoArmazenamento();linhas.push(linhaDiag("Armazenamento do app",arm.status,arm.detalhe));const cache=await diagnosticoCacheApp();linhas.push(linhaDiag("Cache e Service Worker",cache.status,cache.detalhe));const cam=await testarCameraDiag();linhas.push(linhaDiag("Câmera",cam.status,cam.detalhe));let logsHtml="";try{const r=await jsonpRetry("getLogs",{inicio:hojeISO(),fim:hojeISO(),tipo:"login"},1,12000);logsHtml=htmlLoginsDia(r?.logs||[])}catch(e){logsHtml=linhaDiag("Logins de hoje","erro","Não foi possível buscar os logs de login.")}adminConteudo.innerHTML=`<h3>Diagnóstico do dispositivo</h3><div class="grid two"><button onclick="mostrarDiagnostico()">Rodar diagnóstico</button><button class="secondary" onclick="limparArmazenamentoPesado();mostrarDiagnostico()">Limpar dados antigos</button></div>${linhas.join("")}${logsHtml}`}
function turnosComChecklistHoje(){const dia=diaSemanaAtual(),ids=new Set();checklistsCarregados.forEach(c=>{if(!checkEmpresaDispositivo(c)||!usuarioPodeVerEmpresa(usuario,c.empresaId))return;if(c.dias.length&&!c.dias.includes(dia))return;c.turnos.forEach(t=>ids.add(t))});return turnosCarregados.filter(t=>ids.has(t.id)&&usuarioPodeVerTurno(usuario,t.id))}

async function salvarChecklistAdmin(){const dias=[...document.querySelectorAll(".diaCheck:checked")].map(x=>x.value).join(",");const turnos=[...document.querySelectorAll(".turnoCheck:checked")].map(x=>x.value).join(",");const payload={acao:"saveChecklist",id:cId.value.trim(),nome:cNome.value.trim(),descricao:cDesc.value.trim(),empresaId:cEmpresa.value,horario:normalizarHora(cHorario.value.trim()),horarioFim:normalizarHora(cHorarioFim.value.trim()),turnos,dias,prioridade:cPrioridade.value,tarefas:cTarefas.value.trim(),ativo:cAtivo.value,login:usuario.login,nomeUsuario:usuario.nome};if(!payload.id||!payload.nome){alert("Preencha ID e nome.");return}if(!validarIdChecklist()){cId.focus();return}const incompleto=motivoChecklistIncompleto(payload);if(incompleto)payload.ativo="nao";abrirProgresso("Salvando checklist",incompleto?`Cadastro incompleto (${incompleto}). Será salvo como inativo.`:"Atualizando a tela e sincronizando com a base...");const local=normalizarChecklist(payload);upsertItem(checklistsTodos,"id",local);atualizarChecklistsLocais();enviarSegundoPlano(payload);concluirProgresso("Checklist salvo",incompleto?"Checklist salvo como inativo até completar o cadastro.":"Checklist atualizado com sucesso.",()=>mostrarExistentes());sincronizarDepois(()=>secaoAberta==="existentes"&&mostrarExistentes())}

function periodo(tipo){const d=new Date(),pad=n=>String(n).padStart(2,"0");if(tipo==="dia"){const s=hojeISO();return{inicio:s,fim:s}}if(tipo==="mes"){const i=`${d.getFullYear()}-${pad(d.getMonth()+1)}-01`;const f=new Date(d.getFullYear(),d.getMonth()+1,0);return{inicio:i,fim:`${f.getFullYear()}-${pad(f.getMonth()+1)}-${pad(f.getDate())}`}}const day=d.getDay(),diff=(day===0?-6:1-day),mon=new Date(d);mon.setDate(d.getDate()+diff);const sun=new Date(mon);sun.setDate(mon.getDate()+6);return{inicio:`${mon.getFullYear()}-${pad(mon.getMonth()+1)}-${pad(mon.getDate())}`,fim:`${sun.getFullYear()}-${pad(sun.getMonth()+1)}-${pad(sun.getDate())}`}}
function dataObjISO(s){const [a,m,d]=String(s).split("-").map(Number);return new Date(a,(m||1)-1,d||1)}
function isoData(d){const p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`}
function dataBRISO(s){const d=dataObjISO(s),p=n=>String(n).padStart(2,"0");return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()}`}
function diaSemanaData(s){return ["dom","seg","ter","qua","qui","sex","sab"][dataObjISO(s).getDay()]}
function datasPeriodo(inicio,fim){const out=[],hoje=hojeISO();for(let d=dataObjISO(inicio);isoData(d)<=fim&&isoData(d)<=hoje;d.setDate(d.getDate()+1))out.push(isoData(d));return out}
function statusRelatorio(c,e,data){if(e)return statusExecucao(c,e);if(data<hojeISO())return"expirado";return statusExecucao(c,null)}
function linhasRelatorioPeriodo(inicio,fim,execs,empresaId=""){
  const mapa={},usados=new Set();
  execs.forEach(e=>{mapa[e.idExecucao]=e});
  const linhas=[];
  datasPeriodo(inicio,fim).forEach(data=>{
    const dia=diaSemanaData(data);
    checklistsCarregados.filter(c=>(!empresaId||(c.empresaId||"")===empresaId)&&(!c.dias.length||c.dias.includes(dia))).forEach(c=>{
      const idE=execId(c,data),e=mapa[idE]||getExecLocal(idE),st=statusRelatorio(c,e,data);
      usados.add(idE);
      linhas.push({data,checklist:c,idExec:idE,exec:e,status:st});
    });
  });
  execs.filter(e=>e.idExecucao&&!usados.has(e.idExecucao)).forEach(e=>{const c=checklistsTodos.find(x=>x.id===e.idChecklist);if(empresaId&&(!c||(c.empresaId||"")!==empresaId))return;linhas.push({data:e.data,checklist:c||null,idExec:e.idExecucao,exec:e,status:e.status||"finalizado"})});
  return linhas.sort((a,b)=>(a.data||"").localeCompare(b.data||"")||(a.checklist?horarioParaMinutos(a.checklist.horario):horarioParaMinutos(a.exec?.horario))- (b.checklist?horarioParaMinutos(b.checklist.horario):horarioParaMinutos(b.exec?.horario)));
}

  const titulo=c?.nome||e?.nomeChecklist||"-";
  const horario=`${c?.horario||e?.horario||"--:--"} até ${c?.horarioFim||e?.horarioFim||"--:--"}`;

  return `<div class="tableItem ${pendente?'gray':''} reportItem">
    <div>
      <b>${titulo}</b><br>
      Data: ${dataBRISO(o.data||hojeISO())}<br>

    </div>
    ${e?.urlPDF?`<a class="btn blue miniAction" target="_blank" href="${e.urlPDF}">Abrir PDF</a>`:""}
  </div>`;
}
