<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Monitor de Alertas v6.15</title><link rel="manifest" href="manifest.json"><link rel="icon" href="icon-192.png"><link rel="stylesheet" href="styles.css?v=6.15-storage-20260623"></head><body><div class="container"><div class="topbar"><div class="logoArea"><img src="icon-512.png" class="logo"><div><h1>Monitor de Alertas</h1><div class="sub">Painel Operacional v6.15</div></div></div><div class="row" style="width:auto"><button class="secondary" style="width:auto;margin:0" onclick="atualizarManual()">Atualizar</button><a class="btn secondary" style="width:auto;margin:0" href="login.html">Login</a></div></div><div class="card center"><div class="monitorClockRow"><div class="kpi" id="relogio">--:--</div><button class="visualizadoBtn" onclick="silenciarAlarmeAtual()">Visualizado</button></div><div id="status">Carregando...</div><div class="small" id="empresaStatus"></div></div><div id="lista"></div><div class="footerStatus" id="footerStatus">v6.15</div></div><script src="config.js?v=6.15-storage-20260623"></script><script src="app.js?v=6.15-storage-20260623"></script><script>
let checks=[],execs=[],empresas=[];
function nomeEmpresaLocal(id){return empresas.find(e=>e.id===id)?.nome||id||"Sem empresa"}
function empresaAtual(){return localStorage.getItem("empresaDispositivo")||""}
function renderEmpresaStatus(){const emp=empresaAtual();empresaStatus.innerText=emp?`Empresa deste dispositivo: ${nomeEmpresaLocal(emp)}`:"Empresa deste dispositivo não definida"}
async function carregar(force=true,forte=false){let pacote;try{pacote=forte?await sincronizarBaseCompleta(hojeISO(),hojeISO()):await carregarPacoteOnline(hojeISO(),hojeISO(),force)}catch(e){if(forte)throw e;pacote={sync:null,empresas:listaLocal("empresasSistema",[]),checklists:listaLocal("checklistsSistema",[]),execucoes:Mem.execucoes||[]}}empresas=pacote.empresas||[];checks=(pacote.checklists||[]).filter(c=>c.ativo!=="nao");execs=pacote.execucoes||[];renderEmpresaStatus();marcarSync(pacote.sync?.servidorEm);render()}
async function atualizarManual(){status.innerHTML="Atualizando...";try{await carregar(true,true)}catch(e){status.innerHTML="Não foi possível atualizar a base online agora."}}
function ex(id){return execs.find(e=>e.idExecucao===id)||getExecLocal(id)}
async function verificarTelegramVencidos(){try{await jsonp("verificarVencidos",{empresaId:empresaAtual()})}catch(e){}}
function render(){relogio.innerText=horaBR();const dia=diaSemanaAtual(),emp=empresaAtual();const arr=checks.filter(c=>c.ativo!=="nao"&&c.empresaId&&(!emp||c.empresaId===emp)&&(!c.dias.length||c.dias.includes(dia))).map(c=>({checklist:c,idExec:execId(c),exec:ex(execId(c))})).map(o=>({...o,status:statusExecucao(o.checklist,o.exec)})).sort(ordenarCards);const pend=arr.filter(o=>["liberado","atrasado","critico","executando","reaberto","aguardando_envio"].includes(o.status));status.innerHTML=pend.length?` ${pend.length} pendência(s)`:"✓ Nenhuma pendência agora";lista.innerHTML=arr.map(o=>{disparar(o);return`<div class="card ${classeStatus(o.status)}"><h2>${o.checklist.nome}</h2><span class="badge gray">${nomeEmpresaLocal(o.checklist.empresaId)}</span><span class="badge blue">${o.checklist.horario} até ${o.checklist.horarioFim}</span><p>${textoStatus(o.status,o.checklist,o.exec)}</p></div>`}).join("");footerStatus.innerText=`Monitor v6.15 • ${navigator.onLine?" Online":" Offline"} • ${textoUltimaSync()}`}
function disparar(o){if(o.status==="liberado")alertaUnico(o.idExec,"monitor_liberado",1);if(o.status==="atrasado")alertaUnico(o.idExec,"monitor_atrasado30",3);if(o.status==="critico")alertaUnico(o.idExec,"monitor_critico1h",6)}
async function syncDiarioMonitor(){await carregar(true,true);await verificarTelegramVencidos()}
garantirEmpresaDispositivo().then(()=>carregar(true)).then(verificarTelegramVencidos).then(()=>agendarSyncDiario("syncDiarioMonitor",syncDiarioMonitor));setInterval(()=>garantirEmpresaDispositivo().then(()=>carregar(false)).then(verificarTelegramVencidos),60000);setInterval(render,1000);
</script></body></html>
